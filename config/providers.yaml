refresh_seconds: 30
timezone: UTC

display:
  # backend: waveshare_2in13_v3
  backend: mock
  width: 122
  height: 250
  rotation: 0
  full_refresh_every_n_updates: 50

screens:
  - name: AI Health
    template: status_board
    poll_interval: 30
    display_duration: 30
    categories:
      - name: Claude
        url: https://status.claude.com/api/v2/summary.json
        type: statuspage
        icon: anthropic
        items:
          - key: claude.ai
            label: AI
          - key: Claude Code
            label: Code
          - key: Claude API (api.anthropic.com)
            label: API

      - name: OpenAI
        url: https://status.openai.com/api/v2/summary.json
        type: statuspage
        icon: openai
        items:
          - key: App
            label: App
          - key: Conversations
            label: Chat
          - key: Codex Web
            label: Web
          - key: Codex API
            label: API

      - name: Lotus
        url: https://lotus.therektgames.com/health
        type: lotus_health
        icon: lotus
        items:
          - key: Lotus
            label: Live
          - key: Queue
            label: Queue

  - name: Lotus
    template: tamagotchi
    poll_interval: 5
    display_duration: 15
    url: https://lotus.therektgames.com/health
    stats_url: https://lotus.therektgames.com/stats
    sprites:
      idle: img/irk_1.png
      working: img/irk_2.png
      error: img/irk_3.png
      success: img/irk_4.png
    mood_map:
      field: status
      ok: idle
      ok_busy: working
      error: error
    info_lines:
      - label: status
        field: status
      - label: pending
        field: pending
      - label: PRs
        template: "+{prs_created} M{prs_merged}"
        fields: [prs_created, prs_merged]
      - label: Issues
        field: issues_created
      - label: Resolved
        field: comments_resolved
      - label: Commits
        field: commits_today
      - label: Last
        field: last_action
        max_length: 18
