# Refresh interval in seconds (default: 300 = 5 minutes)
refresh_seconds: 300

# Timezone for timestamp display (e.g. UTC, America/New_York)
timezone: UTC

# Display backend configuration
display:
  # Backend: "mock" (PNG file), "waveshare_2in13_v3" (Waveshare 2.13" V3 e-paper)
  backend: mock
  # EPD native resolution (Waveshare 2.13" V3 = 122x250 portrait)
  # The driver auto-rotates landscape images, so leave these as-is.
  width: 122
  height: 250
  # Full refresh every N cycles to reduce ghosting (e-paper only)
  full_refresh_every_n_updates: 6

# List of status providers to poll
providers:
  - name: Claude
    type: statuspage
    url: https://status.claude.com/api/v2/summary.json
    # Component names from the upstream Statuspage
    # (case-insensitive fallback is applied automatically)
    components:
      - claude.ai
      - Claude Code
      - Claude API (api.anthropic.com)

  - name: OpenAI
    type: statuspage
    url: https://status.openai.com/api/v2/summary.json
    components:
      - App
      - Conversations
      - Codex Web
      - Codex API
